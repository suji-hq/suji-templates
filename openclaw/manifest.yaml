slug: openclaw

name: OpenClaw
description: Multi-channel messaging bot with AI-powered responses (Telegram, Discord, WhatsApp, Slack).
homepage_url: https://github.com/openclaw/openclaw
icon_url: https://raw.githubusercontent.com/suji-hq/suji-templates/main/openclaw/icon.svg
version: 2026.3.1-1
release_notes: >-
  Same upstream OpenClaw 2026.3.1 image. Fixes the AI provider wiring: the
  install form's provider + API key now reach the app (previously the generic
  AI_PROVIDER/AI_API_KEY env vars were set but the gateway never read them, so
  installs booted unconfigured). Adds the full set of providers the app
  supports — Anthropic, OpenAI, Google (Gemini), Mistral, Groq, OpenRouter,
  xAI, Moonshot AI — plus an OpenAI-compatible option with a custom base URL
  (vLLM, Ollama, LM Studio, LiteLLM, …) where the API key is optional. Pick
  the exact model in the Control UI after first connect.
categories: [communication, automation]
license: MIT

resources:
  min_memory_mib: 1024
  recommended_memory_mib: 2048
  min_cpu_millicores: 500
  recommended_storage_gib: 5

exposure:
  exposable: true
  default: on
  port: 18789
  subdomain_hint: openclaw

network:
  internal_hostname: openclaw

upgrade_policy: breaking-changes-flagged

registry:
  - ghcr.io
  - docker.io

form_schema:
  - key: AI_PROVIDER
    type: select
    label: AI provider
    description: Which AI service OpenClaw uses for replies. Pick OpenAI-compatible to use any custom endpoint (vLLM, Ollama, LM Studio, LiteLLM, …).
    required: true
    options:
      - { value: anthropic, label: Anthropic (Claude) }
      - { value: openai, label: OpenAI (GPT) }
      - { value: google, label: Google (Gemini) }
      - { value: mistral, label: Mistral }
      - { value: groq, label: Groq }
      - { value: openrouter, label: OpenRouter }
      - { value: xai, label: xAI (Grok) }
      - { value: moonshot, label: Moonshot AI (Kimi) }
      - { value: openai-compatible, label: OpenAI-compatible (custom endpoint) }

  - key: AI_BASE_URL
    type: text
    label: Custom endpoint base URL
    description: Only for OpenAI-compatible — the endpoint's base URL, e.g. https://llm.example.com/v1. Leave blank for the providers above.
    default: ""

  - key: AI_API_KEY
    type: secret
    label: AI API key
    description: Your API key for the chosen provider. Optional for OpenAI-compatible endpoints that don't require authentication.
    default: ""

  - key: OPENCLAW_GATEWAY_PASSWORD
    type: secret
    label: Gateway password
    description: Auto-generated if blank — used to authenticate the bot's webhook callbacks.
    auto_generate: true

  - key: CHANNELS
    type: multiselect
    label: Channels
    description: Messaging platforms OpenClaw connects to.
    required: true
    options:
      - { value: telegram, label: Telegram }
      - { value: discord, label: Discord }
      - { value: whatsapp, label: WhatsApp Cloud API }
      - { value: slack, label: Slack }

  # Per-channel tokens — `default: ""` lets unselected channels render the
  # compose with an empty string instead of leaving `${VAR}` unresolved at
  # deploy time. OpenClaw treats empty channel tokens as "channel disabled".
  - key: TELEGRAM_BOT_TOKEN
    type: secret
    label: Telegram bot token
    description: From @BotFather. Required if Telegram is selected.
    default: ""

  - key: DISCORD_BOT_TOKEN
    type: secret
    label: Discord bot token
    description: From the Discord developer portal. Required if Discord is selected.
    default: ""

  - key: WHATSAPP_TOKEN
    type: secret
    label: WhatsApp Cloud API token
    description: From Meta Business. Required if WhatsApp is selected.
    default: ""

  - key: SLACK_BOT_TOKEN
    type: secret
    label: Slack bot token
    description: From Slack app config. Required if Slack is selected.
    default: ""
