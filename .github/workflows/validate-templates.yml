name: Validate templates

# PR gate: whenever a manifest.yaml / compose.yaml is touched, run the same
# breaking-change analysis the platform's strict validator would imply — lint
# the contract, diff the form/exposure contract against the base branch (so a
# renamed form key or moved exposure port is caught), diff the image contract,
# and boot the app. A BREAKING verdict fails the check — unless the PR
# title/body or merge-commit message carries the literal marker
# `[breaking-approved]`, which downgrades existing-install contract breaks
# (form became required / changed type / moved exposure port) to warnings.
# Malformed-template lint and boot failures always fail, marker or not.

on:
  pull_request:
    paths:
      - "*/manifest.yaml"
      - "*/compose.yaml"
      - "scripts/marketplace_ci.py"
  push:
    branches: [main]
    paths:
      - "*/manifest.yaml"
      - "*/compose.yaml"

permissions:
  contents: read
  pull-requests: write

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0 # need the base ref to diff the contract

      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - run: pip install pyyaml

      # All event-sourced values flow through env (never interpolated into the
      # shell script text) so a hostile folder name / ref can't inject commands.
      - name: Determine changed apps
        id: changed
        env:
          PR_BASE_SHA: ${{ github.event.pull_request.base.sha }}
          PUSH_BEFORE: ${{ github.event.before }}
        run: |
          BASE="${PR_BASE_SHA:-$PUSH_BEFORE}"
          if [ -z "$BASE" ] || ! git cat-file -e "$BASE" 2>/dev/null; then
            BASE="origin/main"
          fi
          echo "base=$BASE" >> "$GITHUB_OUTPUT"
          # Restrict to well-formed slug folders; ignores anything exotic.
          apps=$(git diff --name-only "$BASE"...HEAD \
            | grep -E '^[a-z0-9-]+/(manifest|compose)\.yaml$' \
            | cut -d/ -f1 | sort -u)
          echo "apps<<EOF" >> "$GITHUB_OUTPUT"
          echo "$apps" >> "$GITHUB_OUTPUT"
          echo "EOF" >> "$GITHUB_OUTPUT"
          echo "Changed apps:"; echo "$apps"

      - name: Analyze each changed app
        id: analyze
        env:
          APPS: ${{ steps.changed.outputs.apps }}
          BASE: ${{ steps.changed.outputs.base }}
          # Marker sources for the deliberate breaking-change override. These
          # flow through env (never interpolated into the script) so a hostile
          # title/body/message can't inject commands.
          PR_TITLE: ${{ github.event.pull_request.title }}
          PR_BODY: ${{ github.event.pull_request.body }}
          HEAD_COMMIT_MSG: ${{ github.event.head_commit.message }}
          # Optional LLM breaking-change pass (skipped gracefully when unset; not
          # available on fork PRs, where secrets aren't exposed).
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
        run: |
          set -e
          rc=0
          : > /tmp/pr-report.md
          # Deliberate override: a maintainer who has reviewed the breaking
          # analysis can add the literal marker `[breaking-approved]` to the PR
          # title/body or the merge-commit message to waive ONLY the
          # existing-install contract-diff breaks (a newly-required field, a
          # changed field type, a moved exposure port). Malformed-template lint
          # errors and boot failures still fail the check.
          ALLOW=""
          if printf '%s\n%s\n%s' "$PR_TITLE" "$PR_BODY" "$HEAD_COMMIT_MSG" \
              | grep -qF '[breaking-approved]'; then
            echo "::warning::[breaking-approved] found — existing-install contract breaks will be downgraded to warnings for this run."
            ALLOW="--allow-contract-break"
          fi
          # $APPS is a plain env value — `for` word-splits it but does NOT
          # re-evaluate command substitution, so this is injection-safe.
          for app in $APPS; do
            case "$app" in
              *[!a-z0-9-]*) echo "skip malformed app name: $app"; continue ;;
            esac
            echo "::group::analyze $app"
            CI_REPORT_PATH="/tmp/report-$app.md" \
              python3 scripts/marketplace_ci.py analyze "$app" \
                --from-worktree --base "$BASE" --fail-on-breaking $ALLOW || rc=1
            cat "/tmp/report-$app.md" >> /tmp/pr-report.md 2>/dev/null || true
            echo "" >> /tmp/pr-report.md
            echo "::endgroup::"
          done
          exit $rc

      - name: Comment report on PR
        if: always() && github.event_name == 'pull_request'
        env:
          GH_TOKEN: ${{ github.token }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
        run: |
          if [ -s /tmp/pr-report.md ]; then
            gh pr comment "$PR_NUMBER" --body-file /tmp/pr-report.md --edit-last 2>/dev/null \
              || gh pr comment "$PR_NUMBER" --body-file /tmp/pr-report.md
          fi
