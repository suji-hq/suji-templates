services:
  # Idempotent ownership fixup. Runs to completion before openclaw starts.
  # Docker only inherits image-side directory ownership on the *first*
  # mount of an empty named volume — so any later mount-path change, or
  # a volume that was once mounted as root, leaves the openclaw process
  # (USER node, uid 1000) unable to write. chown'ing on every deploy is
  # cheap and idempotent, and silently no-ops when ownership is correct.
  init-perms:
    image: docker.io/library/alpine:3.20.3
    user: "0"
    command: chown -R 1000:1000 /home/node/.openclaw
    volumes:
      - openclaw-data:/home/node/.openclaw
    deploy:
      resources:
        limits:
          memory: 64M
          cpus: "0.1"

  openclaw:
    image: ghcr.io/openclaw/openclaw:2026.2.3
    restart: unless-stopped
    depends_on:
      init-perms:
        condition: service_completed_successfully
    environment:
      # All env values are double-quoted so unselected-channel tokens render
      # as the YAML string "" (instead of bare empty, which YAML parses as null).
      #
      # OPENCLAW_GATEWAY_BIND=lan: OpenClaw defaults to loopback-only, which
      # makes it unreachable from outside the container. `lan` binds the
      # container's bridge interface so docker's published port (and
      # cloudflared via the host) can actually reach it. The container is
      # still firewalled — only cloudflared on the host has network access
      # to the published port, and inbound from the internet only arrives
      # via the Cloudflare Tunnel.
      OPENCLAW_GATEWAY_BIND: "lan"
      AI_PROVIDER: "${AI_PROVIDER}"
      AI_API_KEY: "${AI_API_KEY}"
      OPENCLAW_GATEWAY_PASSWORD: "${OPENCLAW_GATEWAY_PASSWORD}"
      CHANNELS: "${CHANNELS}"
      TELEGRAM_BOT_TOKEN: "${TELEGRAM_BOT_TOKEN}"
      DISCORD_BOT_TOKEN: "${DISCORD_BOT_TOKEN}"
      WHATSAPP_TOKEN: "${WHATSAPP_TOKEN}"
      SLACK_BOT_TOKEN: "${SLACK_BOT_TOKEN}"
    ports:
      - "18789"
    volumes:
      # OpenClaw persists state (sqlite + session + config) at
      # /home/node/.openclaw — see upstream Dockerfile, which pre-creates
      # this dir with node:node 0700 so first-run named volumes inherit
      # correct ownership. Mounting elsewhere (e.g. /data) silently loses
      # state across container recreates.
      - openclaw-data:/home/node/.openclaw
    networks: [suji-net]
    deploy:
      resources:
        limits:
          memory: 2048M
          cpus: "1.0"
volumes:
  openclaw-data:
networks:
  suji-net:
    external: true
