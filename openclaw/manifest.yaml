slug: openclaw

name: OpenClaw
description: Multi-channel messaging bot with AI-powered responses (Telegram, Discord, WhatsApp, Slack).
homepage_url: https://github.com/openclaw/openclaw
icon_url: https://raw.githubusercontent.com/suji-hq/suji-templates/main/openclaw/icon.svg
version: 2026.6.6-3
release_notes: >-
  Config is now seeded only once. Previous versions re-applied the gateway
  settings and default model on every deploy, which could archive the active
  chat session on upgrade (the "lost memory" report) — long-term memory was
  always intact, but the live session reset. The install now writes a setting
  only when its stored value actually changes, so re-deploys and upgrades keep
  your running session. Also marks the gateway as the service that receives
  custom environment variables from the new Variables tab. Same upstream
  OpenClaw 2026.6.6 image as -2.
categories: [communication, automation]
license: MIT

resources:
  min_memory_mib: 1024
  recommended_memory_mib: 2048
  min_cpu_millicores: 500
  recommended_storage_gib: 5

exposure:
  exposable: true
  default: on
  port: 18789
  subdomain_hint: openclaw

network:
  internal_hostname: openclaw

# User-defined env vars from the dashboard Variables tab are injected into
# this service. OpenClaw's compose has 3 services (init-perms, init-config,
# openclaw); only the long-running gateway should receive user vars.
primary_service: openclaw

upgrade_policy: breaking-changes-flagged

registry:
  - ghcr.io
  - docker.io

form_schema:
  - key: AI_PROVIDER
    type: select
    label: AI provider
    description: Which AI service OpenClaw uses for replies. Pick OpenAI-compatible to use any custom endpoint (vLLM, Ollama, LM Studio, LiteLLM, …).
    required: true
    options:
      - { value: anthropic, label: Anthropic (Claude) }
      - { value: openai, label: OpenAI (GPT) }
      - { value: google, label: Google (Gemini) }
      - { value: mistral, label: Mistral }
      - { value: groq, label: Groq }
      - { value: openrouter, label: OpenRouter }
      - { value: xai, label: xAI (Grok) }
      - { value: moonshot, label: Moonshot AI (Kimi) }
      - { value: openai-compatible, label: OpenAI-compatible (custom endpoint) }

  - key: AI_BASE_URL
    type: text
    label: Custom endpoint base URL
    description: The endpoint's base URL, e.g. https://llm.example.com/v1.
    default: ""
    show_if: { key: AI_PROVIDER, in: [openai-compatible] }
    required_if: { key: AI_PROVIDER, in: [openai-compatible] }

  - key: AI_API_KEY
    type: secret
    label: AI API key
    description: Your API key for the chosen provider. Optional for OpenAI-compatible endpoints that don't require authentication.
    default: ""
    required_if: { key: AI_PROVIDER, in: [anthropic, openai, google, mistral, groq, openrouter, xai, moonshot] }
    connection_test:
      kind: ai_provider
      provider_key: AI_PROVIDER
      base_url_key: AI_BASE_URL

  - key: AI_MODEL
    type: text
    label: Model
    description: >-
      The model OpenClaw replies with, e.g. gpt-5.5, claude-sonnet-4-6, or
      gemini-3.1-pro-preview. Leave blank to use a sensible default for the
      chosen provider. Required for OpenAI-compatible, OpenRouter, and Moonshot
      (no default is possible). You can change it later in the Control UI.
    default: ""
    required_if: { key: AI_PROVIDER, in: [openai-compatible, openrouter, moonshot] }

  - key: OPENCLAW_GATEWAY_PASSWORD
    type: secret
    label: Gateway password
    description: Auto-generated if blank — used to authenticate the bot's webhook callbacks.
    auto_generate: true

  # Channels are enabled by presence: provide a bot token and OpenClaw's
  # gateway auto-enables that channel at startup, reading the token straight
  # from the env var (no `channels add` needed). Leave a token blank to skip
  # that channel. There is no CHANNELS selector — the gateway does not read
  # one; the token's presence is the switch. WhatsApp (QR pairing) and Slack
  # (needs both a bot and an app token) don't fit a single install-time secret
  # and are configured after install — see the README. `default: ""` keeps the
  # compose ${VAR} resolved when blank.
  - key: TELEGRAM_BOT_TOKEN
    type: secret
    label: Telegram bot token
    description: From @BotFather. Provide it to enable Telegram; leave blank to skip.
    default: ""

  - key: DISCORD_BOT_TOKEN
    type: secret
    label: Discord bot token
    description: From the Discord developer portal. Provide it to enable Discord; leave blank to skip.
    default: ""
