services:
  nocodb:
    image: docker.io/nocodb/nocodb:2026.06.1
    restart: unless-stopped
    environment:
      NC_AUTH_JWT_SECRET: ${NC_AUTH_JWT_SECRET}
      # Tell NocoDB its real public address so share links and the
      # newer origin/redirect handling accept the per-install subdomain.
      # Auto-filled at deploy from the install's subdomain.
      NC_PUBLIC_URL: "${SUJI_PUBLIC_URL}"
    ports:
      - "8080"
    volumes:
      - nocodb-data:/usr/app/data
    networks: [suji-net]
    deploy:
      resources:
        limits:
          memory: 1024M
          cpus: "1.0"
volumes:
  nocodb-data:
networks:
  suji-net:
    external: true
