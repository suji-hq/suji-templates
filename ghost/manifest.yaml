slug: ghost

name: Ghost
description: Modern publishing platform for blogs, newsletters, and membership sites.
homepage_url: https://ghost.org
icon_url: https://raw.githubusercontent.com/suji-hq/suji-templates/main/ghost/icon.svg
version: 6.45.0
release_notes: >-
  Update Ghost to 6.45.0 (major, from 5.99.0). Ghost 6 dropped the Alpine image
  variant, so the template now pins the standard image tag (this also aligns the
  manifest version with the image tag). The public URL is now auto-wired from the
  install's assigned subdomain (Ghost 6 strictly requires a protocol-qualified
  URL), so the manual Site URL field is gone. Same SQLite-on-volume config; Ghost
  runs its own DB migrations on first boot. upgrade_policy stays manual, so
  existing installs upgrade only when you choose.
categories: [cms, productivity]
license: MIT

resources:
  min_memory_mib: 512
  recommended_memory_mib: 1024
  min_cpu_millicores: 250
  recommended_storage_gib: 5

exposure:
  exposable: true
  default: on
  port: 2368
  subdomain_hint: ghost

network:
  internal_hostname: ghost

upgrade_policy: manual

registry:
  - docker.io

form_schema: []
