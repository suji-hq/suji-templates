slug: openclaw

name: OpenClaw
description: Self-hosted AI agent for Telegram, Discord, WhatsApp, and Slack. Bring your own model keys, with memory and tools built in. Runs entirely on your instance.
homepage_url: https://github.com/openclaw/openclaw
icon_url: https://raw.githubusercontent.com/suji-hq/suji-templates/main/openclaw/icon.svg
version: 2026.6.6-9
release_notes: >-
  Copy fix (same upstream OpenClaw 2026.6.6 image as -8): trimmed the Model help
  text to just what to enter. Behaviour is unchanged from -6/-7/-8.
categories: [agents, communication, automation]
license: MIT

resources:
  min_memory_mib: 1024
  recommended_memory_mib: 2048
  min_cpu_millicores: 500
  recommended_storage_gib: 5

exposure:
  exposable: true
  default: on
  port: 18789
  subdomain_hint: openclaw

network:
  internal_hostname: openclaw

# User-defined env vars from the dashboard Variables tab are injected into
# this service. OpenClaw's compose has 3 services (init-perms, init-config,
# openclaw); only the long-running gateway should receive user vars.
primary_service: openclaw

# Post-install "Getting started" steps, shown on the install's Deployment tab.
# reveal_key surfaces the gateway token right where the user needs it, so they
# never have to hunt for it in the Variables tab.
guide:
  - title: Open OpenClaw
    body: >-
      Use the Open button above to load the gateway. Its login screen asks for a
      gateway access token.
  - title: Unlock the gateway
    body: >-
      Reveal your access token below and paste it into the OpenClaw login screen.
      It is the same value any time you need it again.
    reveal_key: OPENCLAW_GATEWAY_PASSWORD
  - title: Pair this browser
    body: >-
      After logging in, OpenClaw may ask you to pair this browser. Follow the
      on-screen prompt (it shows a short command to run). You can open a shell
      from the Console tab here on this page.
  - title: Add a channel (optional)
    body: >-
      Provide a Telegram or Discord bot token in the Variables tab to enable that
      channel. WhatsApp and Slack are set up from inside OpenClaw. Full guide:
      https://docs.suji.fr/marketplace/openclaw

upgrade_policy: breaking-changes-flagged

registry:
  - ghcr.io
  - docker.io

form_schema:
  - key: AI_PROVIDER
    type: select
    label: AI provider
    description: Which AI service OpenClaw uses for replies. Pick OpenAI-compatible to use any custom endpoint (vLLM, Ollama, LM Studio, LiteLLM, …).
    required: true
    options:
      - { value: anthropic, label: Anthropic (Claude) }
      - { value: openai, label: OpenAI (GPT) }
      - { value: google, label: Google (Gemini) }
      - { value: mistral, label: Mistral }
      - { value: groq, label: Groq }
      - { value: openrouter, label: OpenRouter }
      - { value: xai, label: xAI (Grok) }
      - { value: moonshot, label: Moonshot AI (Kimi) }
      - { value: openai-compatible, label: OpenAI-compatible (custom endpoint) }

  - key: AI_BASE_URL
    type: text
    label: Custom endpoint base URL
    description: The endpoint's base URL, e.g. https://llm.example.com/v1.
    default: ""
    show_if: { key: AI_PROVIDER, in: [openai-compatible] }
    required_if: { key: AI_PROVIDER, in: [openai-compatible] }

  - key: AI_API_KEY
    type: secret
    label: AI API key
    description: Your API key for the chosen provider. Optional for OpenAI-compatible endpoints that don't require authentication.
    default: ""
    required_if: { key: AI_PROVIDER, in: [anthropic, openai, google, mistral, groq, openrouter, xai, moonshot] }
    connection_test:
      kind: ai_provider
      provider_key: AI_PROVIDER
      base_url_key: AI_BASE_URL
      # Send the typed model to the test so it validates THAT model first and
      # can verify OpenAI-compatible endpoints that don't expose a /models list.
      model_key: AI_MODEL

  - key: AI_MODEL
    type: text
    label: Model
    description: >-
      The model OpenClaw replies with, e.g. gpt-5.5, claude-sonnet-4-6, or
      gemini-3.1-pro-preview. Run "Test connection" below to list the provider's
      models, or type any value.
    default: ""
    required_if: { key: AI_PROVIDER, in: [openai-compatible, openrouter, moonshot] }
    # Populate suggestions from the AI_API_KEY connection test's model list.
    dynamic_options:
      kind: ai_models
      source_key: AI_API_KEY

  - key: OPENCLAW_GATEWAY_PASSWORD
    type: secret
    label: Gateway access token
    description: >-
      The token that unlocks the OpenClaw gateway UI; its login screen asks for
      exactly this. Leave blank and one is generated for you, and you can reveal
      and copy it any time from this install's Variables tab after setup.
    auto_generate: true

  # Channels are enabled by presence: provide a bot token and OpenClaw's
  # gateway auto-enables that channel at startup, reading the token straight
  # from the env var (no `channels add` needed). Leave a token blank to skip
  # that channel. There is no CHANNELS selector — the gateway does not read
  # one; the token's presence is the switch. WhatsApp (QR pairing) and Slack
  # (needs both a bot and an app token) don't fit a single install-time secret
  # and are configured after install — see the README. `default: ""` keeps the
  # compose ${VAR} resolved when blank.
  - key: TELEGRAM_BOT_TOKEN
    type: secret
    label: Telegram bot token
    description: From @BotFather. Provide it to enable Telegram; leave blank to skip.
    default: ""

  - key: DISCORD_BOT_TOKEN
    type: secret
    label: Discord bot token
    description: From the Discord developer portal. Provide it to enable Discord; leave blank to skip.
    default: ""
