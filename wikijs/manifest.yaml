slug: wikijs

name: Wiki.js
description: Modern, lightweight, powerful wiki built on Node.js, Git, and Markdown.
homepage_url: https://wiki.js.org
icon_url: https://raw.githubusercontent.com/suji-hq/suji-templates/main/wikijs/icon.svg
version: 2.5.307-1
release_notes: >-
  Fix the default SQLite install (DB_FILEPATH was missing, so it never came
  up) and add the option to use an external PostgreSQL or MySQL database. App
  image unchanged (2.5.307).
categories: [productivity, cms]
license: AGPL-3.0

resources:
  min_memory_mib: 1024
  recommended_memory_mib: 2048
  min_cpu_millicores: 500
  recommended_storage_gib: 10

exposure:
  exposable: true
  default: on
  port: 3000
  subdomain_hint: wikijs

network:
  internal_hostname: wikijs

upgrade_policy: manual

registry:
  - docker.io

form_schema:
  - key: DB_TYPE
    type: select
    label: Database
    default: sqlite
    description: >-
      SQLite stores everything in a local file on the install's volume — no
      setup needed. Choose PostgreSQL or MySQL to use an external database you
      already run (it must be reachable from the VM).
    options:
      - { value: sqlite, label: "SQLite (local file, recommended)" }
      - { value: postgres, label: "PostgreSQL (external)" }
      - { value: mysql, label: "MySQL / MariaDB (external)" }
  - key: DB_HOST
    type: text
    label: Database host
    default: ""
    show_if: { key: DB_TYPE, in: [postgres, mysql] }
    required_if: { key: DB_TYPE, in: [postgres, mysql] }
  - key: DB_PORT
    type: number
    label: Database port
    default: 5432
    description: "5432 for PostgreSQL, 3306 for MySQL."
    show_if: { key: DB_TYPE, in: [postgres, mysql] }
    required_if: { key: DB_TYPE, in: [postgres, mysql] }
  - key: DB_NAME
    type: text
    label: Database name
    default: ""
    show_if: { key: DB_TYPE, in: [postgres, mysql] }
    required_if: { key: DB_TYPE, in: [postgres, mysql] }
  - key: DB_USER
    type: text
    label: Database user
    default: ""
    show_if: { key: DB_TYPE, in: [postgres, mysql] }
    required_if: { key: DB_TYPE, in: [postgres, mysql] }
  - key: DB_PASS
    type: secret
    label: Database password
    default: ""
    show_if: { key: DB_TYPE, in: [postgres, mysql] }
    required_if: { key: DB_TYPE, in: [postgres, mysql] }
