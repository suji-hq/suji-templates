<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64" shape-rendering="crispEdges">
  <!-- Minecraft Server (Crafty Controller) — pixel-art creeper face on a grass-green tile -->
  <rect width="64" height="64" rx="14" fill="#4a7a3a"/>
  <g fill="#3c6630">
    <rect x="14" y="14" width="6" height="6"/>
    <rect x="26" y="14" width="6" height="6"/>
    <rect x="38" y="14" width="6" height="6"/>
    <rect x="20" y="20" width="6" height="6"/>
    <rect x="32" y="20" width="6" height="6"/>
    <rect x="44" y="20" width="6" height="6"/>
    <rect x="14" y="32" width="6" height="6"/>
    <rect x="44" y="38" width="6" height="6"/>
    <rect x="20" y="44" width="6" height="6"/>
    <rect x="38" y="44" width="6" height="6"/>
  </g>
  <!-- Creeper face: two eyes + central frown -->
  <g fill="#1d1d1d">
    <rect x="18" y="20" width="10" height="10"/>
    <rect x="36" y="20" width="10" height="10"/>
    <rect x="28" y="30" width="8" height="14"/>
    <rect x="22" y="36" width="6" height="10"/>
    <rect x="36" y="36" width="6" height="10"/>
    <rect x="22" y="44" width="20" height="4"/>
  </g>
