slug: n8n

name: n8n
description: Workflow automation platform with hundreds of integrations (Zapier alternative).
homepage_url: https://n8n.io
icon_url: https://raw.githubusercontent.com/suji-hq/suji-templates/main/n8n/icon.svg
version: 2.29.1
release_notes: >-
  Update n8n to 2.27.3 (from 2.22.2). No template changes — the install form,
  timezone auto-fill, and owner-setup flow are unchanged. Existing installs can
  upgrade in place; n8n runs its own DB migrations on first boot of the new
  version.
categories: [automation, productivity]
license: Apache-2.0

resources:
  min_memory_mib: 512
  recommended_memory_mib: 1024
  min_cpu_millicores: 250
  recommended_storage_gib: 10

exposure:
  exposable: true
  default: on
  port: 5678
  subdomain_hint: n8n

network:
  internal_hostname: n8n

upgrade_policy: manual

registry:
  - docker.io

form_schema:
  - key: GENERIC_TIMEZONE
    type: select
    label: Timezone
    default: UTC
    description: Auto-filled from your browser when your zone is in the list.
    options:
      - { value: UTC, label: UTC }
      - { value: Pacific/Honolulu, label: Pacific/Honolulu }
