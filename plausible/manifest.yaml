slug: plausible

name: Plausible Analytics
description: Privacy-friendly, lightweight web analytics — GDPR-compliant Google Analytics alternative.
homepage_url: https://plausible.io
icon_url: https://raw.githubusercontent.com/suji-hq/suji-templates/main/plausible/icon.svg
version: v3.2.1-1
release_notes: >-
  Update Plausible to v3.2.1 (major, from v2.1.5). No template changes — the
  bundled PostgreSQL + ClickHouse compose is unchanged. The app runs its v3 data
  migrations on first boot (verified locally: createdb + migrate complete, serves
  on 8000). upgrade_policy stays manual, so existing installs upgrade only when
  you choose. SECRET_KEY_BASE is still a required user-provided value (>=64
  chars; generate with `openssl rand -base64 64`).
categories: [analytics]
license: AGPL-3.0

resources:
  # Three services: app (~1 GiB) + Postgres (~0.5 GiB) + ClickHouse (~1 GiB).
  min_memory_mib: 3072
  recommended_memory_mib: 4096
  min_cpu_millicores: 1000
  recommended_storage_gib: 10

exposure:
  exposable: true
  default: on
  port: 8000
  subdomain_hint: plausible

network:
  internal_hostname: plausible

upgrade_policy: manual

registry:
  - docker.io
  - ghcr.io

form_schema:
  - key: BASE_URL
    type: text
    label: Site URL
    description: The full public URL Plausible will be served at (your suji.fr subdomain).
    required: true

  - key: SECRET_KEY_BASE
    type: secret
    label: Secret key base
    description: >-
      A random secret of at least 64 characters. Generate one with:
      openssl rand -base64 64
    required: true

  - key: POSTGRES_PASSWORD
    type: secret
    label: Database password
    description: Password for the bundled PostgreSQL. Auto-generated if blank.
    auto_generate: true
