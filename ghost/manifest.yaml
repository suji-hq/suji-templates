slug: ghost

name: Ghost
description: Modern publishing platform for blogs, newsletters, and membership sites.
homepage_url: https://ghost.org
icon_url: https://raw.githubusercontent.com/suji-hq/suji-templates/main/ghost/icon.svg
version: 5.99.0
categories: [cms, productivity]
license: MIT

resources:
  min_memory_mib: 512
  recommended_memory_mib: 1024
  min_cpu_millicores: 250
  recommended_storage_gib: 5

exposure:
  exposable: true
  default: on
  port: 2368
  subdomain_hint: ghost

network:
  internal_hostname: ghost

upgrade_policy: manual

registry:
  - docker.io

form_schema:
  - key: URL
    type: text
    label: Site URL
    description: Where Ghost will be hosted (e.g. https://blog.example.com). Auto-filled with the assigned subdomain.
    required: true
